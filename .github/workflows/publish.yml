name: Publish

# Publishes to PyPI on a GitHub release using PyPI trusted publishing (OIDC), so
# there is no token to store, and attaches PEP 740 attestations automatically.
on:
  release:
    types: [published]

permissions:
  id-token: write # OIDC, for PyPI trusted publishing and attestations

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv build
      # PyPI trusted publishing signs and attaches PEP 740 attestations. No token
      # is stored, and PyPI verifies the release came from this workflow.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true
