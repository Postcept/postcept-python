name: Publish

# Publishes to PyPI on a GitHub release using PyPI trusted publishing (OIDC), so
# there is no token to store, and attaches PEP 740 attestations automatically.
on:
  release:
    types: [published]

permissions:
  id-token: write # OIDC, for PyPI trusted publishing and attestations

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv sync
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv build
      # PyPI trusted publishing signs and attaches PEP 740 attestations. No token
      # is stored, and PyPI verifies the release came from this workflow.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
